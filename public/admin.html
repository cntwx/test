<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - TRAVELWEB</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-top {
      background: #1a1a2e;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-top h1 {
      font-family: 'Kanit', sans-serif;
      color: var(--gold-light);
      font-size: 1.3rem;
    }
    .admin-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    .admin-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: white;
      font-family: 'Sarabun', sans-serif;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
    }
    .tab-btn.active {
      background: var(--teal-dark);
      color: white;
      border-color: var(--teal-dark);
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .admin-table th {
      background: var(--teal-dark);
      color: white;
      padding: 0.75rem 1rem;
      text-align: left;
      font-family: 'Kanit', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .admin-table td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: 0.88rem;
      vertical-align: middle;
    }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: #f9f7f4; }
    td img.thumb {
      width: 52px;
      height: 38px;
      object-fit: cover;
      border-radius: 6px;
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      width: 90%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { transform: translateY(20px) scale(0.97); opacity: 0 }
      to   { transform: none; opacity: 1 }
    }
    .modal h2 {
      font-family: 'Kanit', sans-serif;
      font-size: 1.3rem;
      color: var(--teal-dark);
      margin-bottom: 1.25rem;
    }
    .modal-footer {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.25rem;
    }

    /* IMAGE UPLOAD AREA */
    .img-upload-area {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
      position: relative;
    }
    .img-upload-area:hover { border-color: var(--teal); }
    .img-upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .img-upload-area .upload-hint { color: var(--muted); font-size: 0.88rem; }
    .img-preview-box {
      margin-top: 0.75rem;
      border-radius: 8px;
      overflow: hidden;
      display: none;
    }
    .img-preview-box img { width: 100%; max-height: 160px; object-fit: cover; border-radius: 8px; }
  </style>
</head>

<body>

<div class="admin-top">
  <h1>👩🏻‍💻 Admin Panel — TRAVELWEB</h1>
  <div style="display:flex;gap:0.75rem;align-items:center">
    <span style="color:rgba(255,255,255,0.7);font-size:0.88rem" id="admin-name"></span>
    <a href="homepage.html" class="btn btn-outline btn-sm">ดูเว็บ</a>
    <button class="btn btn-danger btn-sm" onclick="doLogout()">ออกจากระบบ</button>
  </div>
</div>

<div class="admin-content">
  <div class="admin-tabs">
    <button class="tab-btn active" onclick="switchTab('places',this)">🏝️ สถานที่</button>
    <button class="tab-btn" onclick="switchTab('reviews',this)">💬 รีวิว</button>
    <button class="tab-btn" onclick="switchTab('comments',this)">📝 คอมเมนต์</button>
  </div>
  <div id="tab-places"></div>
  <div id="tab-reviews" style="display:none"></div>
  <div id="tab-comments" style="display:none"></div>
</div>

<!-- PLACE MODAL -->
<div class="modal-overlay" id="place-modal">
  <div class="modal">
    <h2 id="modal-title">➕ เพิ่มสถานที่</h2>
    <input type="hidden" id="edit-id">

    <div class="form-group">
      <label>ชื่อสถานที่ <span style="color:var(--danger)">*</span></label>
      <input type="text" id="m-name" placeholder="เช่น วัดพระแก้ว">
    </div>
    <div class="form-group">
      <label>จังหวัด <span style="color:var(--danger)">*</span></label>
      <input type="text" id="m-province" placeholder="เช่น กรุงเทพมหานคร">
    </div>
    <div class="form-group">
      <label>หมวดหมู่</label>
      <select id="m-category">
        <option>วัด</option><option>ธรรมชาติ</option><option>ชายหาด</option>
        <option>เกาะ</option><option>น้ำตก</option><option>อุทยาน</option>
        <option>วัฒนธรรม</option><option>ตลาด</option><option>พิพิธภัณฑ์</option>
      </select>
    </div>
    <div class="form-group">
      <label>คำอธิบาย <span style="color:var(--danger)">*</span></label>
      <textarea id="m-desc" style="min-height:90px" placeholder="อธิบายสถานที่..."></textarea>
    </div>
    <div class="form-group">
      <label>รูปภาพ</label>
      <div class="img-upload-area" onclick="document.getElementById('m-image-file').click()">
        <input type="file" id="m-image-file" accept="image/*" onchange="previewModalImage(event)" style="display:none">
        <div class="upload-hint">📁 คลิกเพื่อเลือกรูปจากอุปกรณ์</div>
      </div>
      <div class="img-preview-box" id="modal-preview">
        <img id="modal-preview-img" src="" alt="preview">
      </div>
      <!-- แสดงรูปปัจจุบัน (ตอนแก้ไข) -->
      <div id="current-img-box" style="margin-top:0.5rem;display:none">
        <small style="color:var(--muted)">รูปปัจจุบัน:</small><br>
        <img id="current-img" src="" style="max-height:80px;border-radius:6px;margin-top:4px">
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-gold" onclick="savePlace()">💾 บันทึก</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<script src="api.js"></script>
<script>
let allPlaces = [];
const user = getCurrentUser();
if (!user || user.role !== 'admin') { alert('ไม่มีสิทธิ์เข้าถึงหน้านี้'); location.href = 'homepage.html'; }
document.getElementById('admin-name').textContent = `${user.fname} ${user.lname}`;

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['places','reviews','comments'].forEach(t => document.getElementById(`tab-${t}`).style.display = t === tab ? '' : 'none');
  if (tab === 'places') loadPlaces();
  else if (tab === 'reviews') loadReviews();
  else loadComments();
}

/* ==================== PLACES ==================== */
async function loadPlaces() {
  try {
    allPlaces = await apiFetch('/places');
    renderPlacesTable(allPlaces);
  } catch(e) { showToast(e.message,'error'); }
}

function renderPlacesTable(places) {
  // แยก search bar ออก — render แค่ตารางอย่างเดียว
  let container = document.getElementById('tab-places');
  
  // สร้าง search bar ครั้งแรกครั้งเดียว
  if (!document.getElementById('searchPlace')) {
    container.innerHTML = `
      <div style="display:flex;justify-content:space-between;margin-bottom:1rem;gap:1rem;flex-wrap:wrap">
        <input type="text" id="searchPlace" placeholder="🔍 ค้นหาสถานที่..."
          style="padding:0.5rem 0.8rem;border:1px solid var(--border);border-radius:8px;min-width:220px"
          oninput="filterPlaces()">
        <button class="btn btn-gold" onclick="openAdd()">➕ เพิ่มสถานที่ใหม่</button>
      </div>
      <div id="places-table-body"></div>`;
  }

  // render เฉพาะตาราง
  document.getElementById('places-table-body').innerHTML = `
    <table class="admin-table">
      <thead><tr><th>รูป</th><th>ชื่อสถานที่</th><th>หมวดหมู่</th><th>จังหวัด</th><th>รีวิว</th><th>คะแนน</th><th>จัดการ</th></tr></thead>
      <tbody>${places.map(p => `<tr>
        <td>${p.image ? `<img class="thumb" src="${p.image}" onerror="this.style.display='none'">` : '—'}</td>
        <td><strong>${p.name}</strong></td>
        <td>${p.category}</td>
        <td>${p.province}</td>
        <td>${p.review_count}</td>
        <td>${p.avg_rating ? `⭐ ${p.avg_rating}` : '—'}</td>
        <td style="display:flex;gap:0.4rem">
          <button class="btn btn-teal btn-sm" onclick="openEdit(${p.id})">✏️ แก้ไข</button>
          <button class="btn btn-danger btn-sm" onclick="deletePlace(${p.id},'${p.name.replace(/'/g,"\\'")}')">🗑️ ลบ</button>
        </td>
      </tr>`).join('')}</tbody>
    </table>`;
}

function filterPlaces() {
  const kw = document.getElementById('searchPlace').value.toLowerCase();
  renderPlacesTable(allPlaces.filter(p =>
    p.name.toLowerCase().includes(kw) ||
    p.province.toLowerCase().includes(kw) ||
    p.category.toLowerCase().includes(kw)
  ));
}

function openAdd() {
  document.getElementById('modal-title').textContent = '➕ เพิ่มสถานที่ใหม่';
  document.getElementById('edit-id').value = '';
  ['m-name','m-province','m-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('m-category').value = 'วัด';
  document.getElementById('m-image-file').value = '';
  document.getElementById('modal-preview').style.display = 'none';
  document.getElementById('current-img-box').style.display = 'none';
  document.getElementById('place-modal').classList.add('active');
}

async function openEdit(id) {
  try {
    const p = await apiFetch(`/places/${id}`);
    document.getElementById('modal-title').textContent = '✏️ แก้ไขสถานที่';
    document.getElementById('edit-id').value = id;
    document.getElementById('m-name').value = p.name;
    document.getElementById('m-province').value = p.province;
    document.getElementById('m-category').value = p.category;
    document.getElementById('m-desc').value = p.description;
    document.getElementById('m-image-file').value = '';
    document.getElementById('modal-preview').style.display = 'none';

    // แสดงรูปปัจจุบัน
    const curBox = document.getElementById('current-img-box');
    if (p.image) {
      document.getElementById('current-img').src = p.image;
      curBox.style.display = 'block';
    } else {
      curBox.style.display = 'none';
    }

    document.getElementById('place-modal').classList.add('active');
  } catch(e) { showToast(e.message,'error'); }
}

function previewModalImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('modal-preview-img').src = e.target.result;
    document.getElementById('modal-preview').style.display = 'block';
    document.getElementById('current-img-box').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function savePlace() {
  const id = document.getElementById('edit-id').value;
  const name = document.getElementById('m-name').value.trim();
  const province = document.getElementById('m-province').value.trim();
  const category = document.getElementById('m-category').value;
  const description = document.getElementById('m-desc').value.trim();
  const file = document.getElementById('m-image-file').files[0];

  if (!name || !province || !description) {
    showToast('กรุณากรอกข้อมูลให้ครบ','error');
    return;
  }

  // ใช้ FormData เสมอ เพื่อรองรับการ upload รูป
  const formData = new FormData();
  formData.append('name', name);
  formData.append('province', province);
  formData.append('category', category);
  formData.append('description', description);
  if (file) formData.append('image', file);

  try {
    const token = localStorage.getItem('token');
    const method = id ? 'PUT' : 'POST';
    const url = id ? `/places/${id}` : '/places';

    const res = await fetch(url, {
      method,
      headers: { Authorization: 'Bearer ' + token },
      body: formData
    });

    const contentType = res.headers.get('content-type');
    if (!contentType || !contentType.includes('application/json')) {
      throw new Error('Server ตอบกลับผิดรูปแบบ');
    }

    const data = await res.json();
    if (!res.ok) throw new Error(data.message);

    showToast('บันทึกสำเร็จ ✅');
    closeModal();
    loadPlaces();
  } catch(e) { showToast(e.message,'error'); }
}

async function deletePlace(id, name) {
  if (!confirm(`ต้องการลบ "${name}"?\nรีวิวทั้งหมดจะถูกลบด้วย`)) return;
  try {
    await apiFetch(`/places/${id}`, { method: 'DELETE' });
    showToast('ลบสำเร็จ ✅');
    loadPlaces();
  } catch(e) { showToast(e.message,'error'); }
}

function closeModal() {
  document.getElementById('place-modal').classList.remove('active');
}

/* ==================== REVIEWS ==================== */
async function loadReviews() {
  try {
    const reviews = await apiFetch('/reviews');
    document.getElementById('tab-reviews').innerHTML = `
      <table class="admin-table">
        <thead><tr><th>ผู้รีวิว</th><th>สถานที่</th><th>หัวข้อ</th><th>คะแนน</th><th>วันที่</th><th>จัดการ</th></tr></thead>
        <tbody>${reviews.map(r => `<tr>
          <td>${r.fname} ${r.lname}</td>
          <td>${r.place_name}</td>
          <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.title}</td>
          <td>${'⭐'.repeat(r.rating)}</td>
          <td>${new Date(r.created_at).toLocaleDateString('th-TH')}</td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteReview(${r.id})">🗑️ ลบ</button></td>
        </tr>`).join('')}</tbody>
      </table>`;
  } catch(e) { showToast(e.message,'error'); }
}

async function deleteReview(id) {
  if (!confirm('ต้องการลบรีวิวนี้?')) return;
  try {
    await apiFetch(`/reviews/${id}`, { method: 'DELETE' });
    showToast('ลบสำเร็จ ✅');
    loadReviews();
  } catch(e) { showToast(e.message,'error'); }
}

/* ==================== COMMENTS ==================== */
async function loadComments() {
  try {
    const reviews = await apiFetch('/reviews');
    let all = [];
    for (const r of reviews.slice(0,100)) {
      const comments = await apiFetch(`/comments/review/${r.id}`);
      all = all.concat(comments.map(c => ({ ...c, review_title: r.title, place_name: r.place_name })));
    }
    document.getElementById('tab-comments').innerHTML = all.length ? `
      <table class="admin-table">
        <thead><tr><th>ผู้คอมเมนต์</th><th>สถานที่</th><th>ในรีวิว</th><th>คอมเมนต์</th><th>วันที่</th><th>จัดการ</th></tr></thead>
        <tbody>${all.map(c => `<tr>
          <td>${c.fname} ${c.lname}</td>
          <td style="white-space:nowrap">${c.place_name||'—'}</td>
          <td style="max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.review_title||''}</td>
          <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.content}</td>
          <td style="white-space:nowrap">${new Date(c.created_at).toLocaleDateString('th-TH')}</td>
          <td><button class="btn btn-danger btn-sm" onclick="deleteComment(${c.id})">🗑️ ลบ</button></td>
        </tr>`).join('')}</tbody>
      </table>` : '<div style="text-align:center;padding:2rem;color:var(--muted)">ยังไม่มีคอมเมนต์</div>';
  } catch(e) { showToast(e.message,'error'); }
}

async function deleteComment(id) {
  if (!confirm('ต้องการลบคอมเมนต์นี้?')) return;
  try {
    await apiFetch(`/comments/${id}`, { method: 'DELETE' });
    showToast('ลบสำเร็จ ✅');
    loadComments();
  } catch(e) { showToast(e.message,'error'); }
}

loadPlaces();
</script>
</body>
</html>
